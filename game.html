<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project: Rock Paper Scissors</title>
        <link rel="stylesheet" href="./css/game.css">
        <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.2.1/tsparticles.confetti.bundle.min.js" defer></script>
        <script src="script.js" defer></script>
    </head>

    <body>
        <header>
            <div class="header">
                <a id="home" href="index.html">Home</a>
            </div>
        </header>        
        <main>
            <div class="h1">
                <h1>Rock Paper Scissors</h1>
            </div>
            <div class="round">
                <p id="round">Round 1</p>
            </div>
            <div class="scoreBoard">
                <div class="playerScore">
                    <p id="playerName">You</p>
                    <p id="playerScore">0</p>
                </div>
                <div class="botScore">
                    <p id="botName">Computer</p>
                    <p id="botScore">0</p>
                </div>
            </div>
            <div class="compare">
                <div class="human">
                    <div class="humanChoiceImg">
                        <img id="humanChoiceImg" src="./images/player/rock.png">
                    </div>
                </div>
                <div class="result">
                    <p id="result"></p>
                </div>
                <div class="computer">
                    <div class="computerChoiceImg">
                        <img id="computerChoiceImg" src="./images/computer/rock.png">
                    </div>
                </div>
            </div>
            <div class="choices">
                <button id="rock">Rock</button>
                <button id="paper">Paper</button>
                <button id="scissors">Scissors</button>
            </div>
            <div class="choose">Choose your piece...</div>
            <div class="addBtn"></div>
        </main>
        <footer>
            <div class="footerlink">
                &copy;
                <a id="odinlink" href="https://www.theodinproject.com/about" target="_blank">The Odin Project</a>. All rights reserved. | 
                <a id="githublink" href="https://github.com/yehoshua-001/rock-paper-scissors" target="_blank">github.com/yehoshua-001</a>
            </div>
        </footer>
    </body>
</html>
